apiVersion: v1
kind: Service
metadata:
  name: {{ include "phi-audit.api.fullname" . }}
  labels:
    {{- include "phi-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
  selector:
    app.kubernetes.io/name: {{ include "phi-audit.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "phi-audit.dashboard.fullname" . }}
  labels:
    {{- include "phi-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
  selector:
    app.kubernetes.io/name: {{ include "phi-audit.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboard

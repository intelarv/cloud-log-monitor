apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "phi-audit.dashboard.fullname" . }}
  labels:
    {{- include "phi-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  {{- if not .Values.dashboard.hpa.enabled }}
  replicas: {{ .Values.dashboard.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "phi-audit.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels:
        {{- include "phi-audit.labels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "phi-audit.dashboard.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx user in nginx:alpine
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: dashboard
          image: "{{ .Values.image.dashboard.repository }}:{{ .Values.image.dashboard.tag }}"
          imagePullPolicy: {{ .Values.image.dashboard.pullPolicy }}
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            # nginx needs writable temp + run + cache paths even when root
            # filesystem is read-only.
            - { name: nginx-cache, mountPath: /var/cache/nginx }
            - { name: nginx-run,   mountPath: /var/run }
            - { name: tmp,         mountPath: /tmp }
      volumes:
        - name: nginx-cache
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
        - name: nginx-run
          emptyDir: { medium: Memory, sizeLimit: 8Mi }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 16Mi }

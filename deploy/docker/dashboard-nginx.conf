# SPA-serving nginx config. Static assets, hashed-filename cache, and a
# fallback to index.html for client-side routing. /api is NOT proxied here
# — the Ingress sends /api directly to the api-server Service. This
# container only serves the SPA bundle. PHI never transits this container.

server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Conservative security headers. CSP is intentionally tight: no inline,
    # connect-src 'self' (so the SPA can only talk to its own origin — the
    # Ingress fans /api out internally), no third-party hosts.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hashed asset filenames → long cache. Vite emits these under /assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entrypoint must NOT be cached aggressively, or hot deploys are
    # invisible to existing tabs.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Tiny health probe.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Client-side router fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    PHI/PII Log Audit — M0 walking skeleton.
    See docs/ARCHITECTURE.md §24 for scope.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: findings
  - name: chat
  - name: ledger
  - name: tools

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Dev login (M0 — no password).
      description: |
        M0 dev-only login. Accepts a username and returns a signed-cookie session
        scoped to a single tenant. Production replaces this with OIDC; see
        ARCHITECTURE.md §15.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the session cookie.
      responses:
        "204":
          description: Logged out

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current session.
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings:
    get:
      operationId: listFindings
      tags: [findings]
      summary: List findings (redacted view).
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved, false_positive]
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        "200":
          description: Redacted findings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Finding" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings/{id}:
    get:
      operationId: getFinding
      tags: [findings]
      summary: Get a single finding (redacted view).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Finding
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions for the current user.
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatSession" }
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatSessionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatSession" }

  /chat/sessions/{id}/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List messages in a session.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: |
        Send a user message and stream the agent's response over Server-Sent
        Events (AG-UI envelope).
      description: |
        Returns `text/event-stream`. Orval cannot generate a typed React Query
        hook for this endpoint; the dashboard consumes the stream with raw
        `fetch` + ReadableStream parsing.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatMessageInput" }
      responses:
        "200":
          description: AG-UI event stream
          content:
            text/event-stream:
              schema:
                type: string

  /ledger:
    get:
      operationId: listLedger
      tags: [ledger]
      summary: Paginated ledger head.
      parameters:
        - name: after_seq
          in: query
          schema: { type: integer, minimum: 0 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Ledger page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerPage" }

  /admin/ledger/verify:
    get:
      operationId: verifyLedger
      tags: [ledger]
      summary: Walk the ledger chain and verify each hash.
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerVerifyResult" }

  /tools/get_finding:
    post:
      operationId: invokeGetFindingTool
      tags: [tools]
      summary: |
        MCP-shaped tool invocation surface for `get_finding`. Mirrors what the
        agent calls internally; useful for dashboard re-validation of
        citations and for manual exercises.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToolGetFindingInput" }
      responses:
        "200":
          description: Tool result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    LoginInput:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        tenant_id:
          type: string
          minLength: 1
          maxLength: 64
          default: default

    Session:
      type: object
      required: [sub, tenant_id]
      properties:
        sub: { type: string }
        tenant_id: { type: string }
        exp: { type: ["integer", "null"] }

    Finding:
      type: object
      required:
        - id
        - tenant_id
        - classification
        - severity
        - status
        - source
        - fingerprint
        - redacted_evidence
        - detector_version
        - first_seen_at
        - last_seen_at
        - occurrence_count
      properties:
        id: { type: string }
        tenant_id: { type: string }
        classification:
          type: string
          enum: [phi, secrets, pii, pii_s, internal, config, phi_in_output]
        subclass: { type: ["string", "null"] }
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, resolved, false_positive]
        source: { type: string }
        fingerprint: { type: string }
        redacted_evidence: { $ref: "#/components/schemas/RedactedEvidence" }
        detector_version: { type: string }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        occurrence_count: { type: integer }

    RedactedEvidence:
      type: object
      required: [snippet, redactions, truncated]
      properties:
        snippet: { type: string }
        redactions:
          type: array
          items: { type: string }
        truncated: { type: boolean }
        trust:
          type: string
          enum: [trusted, untrusted]
          default: untrusted

    ChatSession:
      type: object
      required: [id, tenant_id, user_id, created_at]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        user_id: { type: string }
        title: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }

    ChatSessionInput:
      type: object
      properties:
        title:
          type: string
          maxLength: 200

    ChatMessage:
      type: object
      required: [id, session_id, tenant_id, role, content, citations, created_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        tenant_id: { type: string }
        role:
          type: string
          enum: [user, assistant]
        content: { type: string }
        citations:
          type: array
          items: { type: string }
        agent_identity:
          oneOf:
            - $ref: "#/components/schemas/AgentIdentity"
            - type: "null"
        created_at: { type: string, format: date-time }

    AgentIdentity:
      type: object
      required: [agent, agent_version, model_id, prompt_hash]
      properties:
        agent: { type: string }
        agent_version: { type: string }
        model_id: { type: string }
        prompt_hash: { type: string }
        tool_versions:
          type: array
          items: { type: string }

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

    LedgerEntry:
      type: object
      required: [seq, ts, actor, event_type, payload, prev_hash, hash]
      properties:
        seq: { type: integer }
        ts: { type: string, format: date-time }
        tenant_id: { type: ["string", "null"] }
        actor:
          type: object
          additionalProperties: true
        event_type: { type: string }
        subject_type: { type: ["string", "null"] }
        subject_id: { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: true
        prev_hash: { type: string }
        hash: { type: string }

    LedgerPage:
      type: object
      required: [entries, head_seq, head_hash]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/LedgerEntry" }
        head_seq: { type: integer }
        head_hash: { type: string }

    LedgerVerifyResult:
      type: object
      required: [ok, walked, head_seq, head_hash, errors]
      properties:
        ok: { type: boolean }
        walked: { type: integer }
        head_seq: { type: integer }
        head_hash: { type: string }
        errors:
          type: array
          items: { type: string }

    ToolGetFindingInput:
      type: object
      required: [finding_id]
      properties:
        finding_id:
          type: string
          minLength: 1
          maxLength: 64

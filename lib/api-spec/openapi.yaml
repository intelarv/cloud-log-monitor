openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    PHI/PII Log Audit — M0 walking skeleton.
    See docs/ARCHITECTURE.md §24 for scope.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: findings
  - name: chat
  - name: ledger
  - name: tools
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Dev login (M0 — no password).
      description: |
        M0 dev-only login. Accepts a username and returns a signed-cookie session
        scoped to a single tenant. Production replaces this with OIDC; see
        ARCHITECTURE.md §15.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the session cookie.
      responses:
        "204":
          description: Logged out

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current session.
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings:
    get:
      operationId: listFindings
      tags: [findings]
      summary: List findings (redacted view).
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved, false_positive]
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        "200":
          description: Redacted findings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Finding" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings/{id}:
    get:
      operationId: getFinding
      tags: [findings]
      summary: Get a single finding (redacted view).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Finding
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings/{id}/history:
    get:
      operationId: getFindingHistory
      tags: [findings]
      summary: |
        Audit-ledger history for a single finding (most-recent-first). Returns
        every ledger entry whose subject is this finding — resolve / reopen
        transitions and break-glass grant / approve / revoke events — including
        the free-text reason where one was recorded. Tenant-scoped; redacted
        payloads only (free text was content-policy scanned at write time).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Finding history (ledger events)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LedgerEntry" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /findings/{id}/review-history:
    get:
      operationId: getFindingReviewHistory
      tags: [findings]
      summary: |
        Agent review re-run history for a single finding, reconstructed from the
        tamper-evident ledger. Each agent review (initial + every fix-and-replay)
        is grouped into a numbered attempt carrying its triage and verifier
        verdicts so an analyst can see why a verdict changed across re-runs.
        Tenant-scoped; redacted rationale only (PHI was scanned out at write time).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Finding review-attempt history (most-recent attempt first)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewHistory" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions for the current user.
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatSession" }
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatSessionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatSession" }

  /chat/sessions/{id}/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: List messages in a session.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: |
        Send a user message and stream the agent's response over Server-Sent
        Events (AG-UI envelope).
      description: |
        Returns `text/event-stream`. Orval cannot generate a typed React Query
        hook for this endpoint; the dashboard consumes the stream with raw
        `fetch` + ReadableStream parsing.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatMessageInput" }
      responses:
        "200":
          description: AG-UI event stream
          content:
            text/event-stream:
              schema:
                type: string

  /ledger:
    get:
      operationId: listLedger
      tags: [ledger]
      summary: Paginated ledger head.
      parameters:
        - name: after_seq
          in: query
          schema: { type: integer, minimum: 0 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: actor
          in: query
          description: >
            Filter to a single human actor's entries (the actor's id). Used by
            the "show me everything this analyst did" pivot so a reviewer sees
            the actor's complete trail, server-filtered and paginated, instead
            of only entries that happen to be in the most-recent window.
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Ledger page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerPage" }

  /admin/ledger/verify:
    get:
      operationId: verifyLedger
      tags: [ledger]
      summary: Walk the ledger chain and verify each hash.
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerVerifyResult" }

  /admin/ledger/checkpoints:
    get:
      operationId: listLedgerCheckpoints
      tags: [ledger]
      summary: |
        List external HMAC notarization checkpoints. Pass `verify=1` to also
        run the live cross-check (signature + ledger-hash match) and return
        the verification result.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: verify
          in: query
          schema: { type: string, enum: ["0", "1"] }
      responses:
        "200":
          description: Checkpoints (and optional verify result)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LedgerCheckpointsPage" }

  /admin/metrics/maintenance:
    get:
      operationId: getMaintenanceMetrics
      tags: [ledger]
      summary: |
        Aggregate counts for the two opt-in cache-pruning maintenance jobs
        (M10.4 raw-evidence tiering, M10.5 memory eviction) from the audit
        ledger, scoped to the caller's tenant. Counts only — no PHI, no finding
        ids, no object URIs.
      responses:
        "200":
          description: Maintenance-job activity counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceMetrics" }

  /auth/step-up:
    post:
      operationId: stepUp
      tags: [auth]
      summary: Elevate the session for break-glass actions (5-min cookie).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpInput" }
      responses:
        "200":
          description: Step-up granted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StepUpResult" }
        "400":
          description: Invalid input or rejected reason text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid step-up token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/status:
    get:
      operationId: stepUpStatus
      tags: [auth]
      summary: Active step-up provider and (for TOTP) the caller's factor status.
      responses:
        "200":
          description: Step-up status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StepUpStatus" }

  /auth/step-up/enroll:
    post:
      operationId: stepUpEnroll
      tags: [auth]
      summary: |
        Provision a fresh TOTP secret (STEP_UP_PROVIDER=totp only). Returns the
        otpauth URI + base32 secret to display once; the factor is UNVERIFIED
        until confirmed.
      responses:
        "200":
          description: Enrollment provisioned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StepUpEnrollResult" }
        "404":
          description: TOTP step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/enroll/verify:
    post:
      operationId: stepUpEnrollVerify
      tags: [auth]
      summary: Confirm a pending TOTP enrollment with a live 6-digit code.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepUpEnrollVerifyInput" }
      responses:
        "200":
          description: Enrollment confirmed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StepUpEnrollVerifyResult" }
        "400":
          description: Invalid or non-matching code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: TOTP step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/webauthn/register/begin:
    post:
      operationId: stepUpWebauthnRegisterBegin
      tags: [auth]
      summary: |
        Begin WebAuthn step-up registration (STEP_UP_PROVIDER=webauthn only).
        Returns the public-key creation options for navigator.credentials.create().
      responses:
        "200":
          description: Registration options issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebauthnRegistrationOptions" }
        "404":
          description: WebAuthn step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/webauthn/register/finish:
    post:
      operationId: stepUpWebauthnRegisterFinish
      tags: [auth]
      summary: Verify the WebAuthn attestation ceremony and mark the credential verified.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebauthnRegisterFinishInput" }
      responses:
        "200":
          description: Registration confirmed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebauthnRegisterFinishResult" }
        "400":
          description: Invalid input or attestation verification failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: WebAuthn step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/webauthn/challenge:
    post:
      operationId: stepUpWebauthnChallenge
      tags: [auth]
      summary: |
        Issue a single-use assertion challenge for an enrolled WebAuthn credential.
        The resulting assertion is submitted to /auth/step-up as the token.
      responses:
        "200":
          description: Assertion challenge issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebauthnStepUpOptions" }
        "400":
          description: No verified WebAuthn credential
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: WebAuthn step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/oidc/register/begin:
    post:
      operationId: stepUpOidcRegisterBegin
      tags: [auth]
      summary: |
        Begin OIDC step-up enrollment (STEP_UP_PROVIDER=oidc only). Returns an
        IdP authorization URL the dashboard opens in a popup to link the user's
        federated identity.
      responses:
        "200":
          description: Authorization URL issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OidcAuthUrl" }
        "404":
          description: OIDC step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/oidc/register/finish:
    post:
      operationId: stepUpOidcRegisterFinish
      tags: [auth]
      summary: |
        Complete OIDC enrollment with the {code,state} returned from the IdP
        callback; verifies the ID token and links the federated identity.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OidcRegisterFinishInput" }
      responses:
        "200":
          description: Enrollment confirmed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OidcRegisterFinishResult" }
        "400":
          description: Invalid input or ID-token verification failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: OIDC step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/oidc/challenge:
    post:
      operationId: stepUpOidcChallenge
      tags: [auth]
      summary: |
        Issue an IdP authorization URL for an enrolled federated identity. The
        resulting {code,state} is submitted to /auth/step-up as the token (JSON).
      responses:
        "200":
          description: Authorization URL issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OidcAuthUrl" }
        "400":
          description: No verified OIDC identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: OIDC step-up is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/recovery/status:
    get:
      operationId: stepUpRecoveryStatus
      tags: [auth]
      summary: |
        Backup-code status for the caller (whether a set exists and how many
        codes remain). 404 under the dev provider.
      responses:
        "200":
          description: Recovery-code status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryStatus" }
        "404":
          description: Step-up factor management is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/recovery/generate:
    post:
      operationId: stepUpRecoveryGenerate
      tags: [auth]
      summary: |
        Generate (or regenerate) a fresh set of single-use backup codes.
        Requires a valid step-up cookie and a verified factor. The plaintext
        codes are returned exactly once.
      responses:
        "200":
          description: Backup codes generated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryCodesResult" }
        "400":
          description: No verified second factor to back up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Step-up authentication required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Step-up factor management is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/recovery:
    post:
      operationId: stepUpRecovery
      tags: [auth]
      summary: |
        Redeem a single-use backup code as a step-up (5-min cookie). Mirrors
        /auth/step-up but the token is a recovery code, consumed on success.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecoveryStepUpInput" }
      responses:
        "200":
          description: Step-up granted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StepUpResult" }
        "400":
          description: Invalid input or rejected reason text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid recovery code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Step-up factor management is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/step-up/factor/remove:
    post:
      operationId: stepUpFactorRemove
      tags: [auth]
      summary: |
        Remove the caller's enrolled second factor and its backup codes (the
        "lost my device, start over" path). Requires a valid step-up cookie.
      responses:
        "200":
          description: Factor removed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FactorRemoveResult" }
        "401":
          description: Step-up authentication required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: No enrolled factor / factor management is not enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/break-glass/grants:
    get:
      operationId: listBreakGlassGrants
      tags: [admin]
      summary: List the caller's break-glass grants (most recent first).
      responses:
        "200":
          description: Grants
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BreakGlassGrant" }
    post:
      operationId: createBreakGlassGrant
      tags: [admin]
      summary: |
        Issue a break-glass grant for raw-PHI access on a single finding.
        Requires a valid step-up cookie. Critical-severity findings are
        created PENDING and require a second-person approval.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BreakGlassGrantInput" }
      responses:
        "201":
          description: Grant issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BreakGlassGrant" }
        "400":
          description: Invalid input or rejected justification text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated or step-up missing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/break-glass/grants/{id}/approve:
    post:
      operationId: approveBreakGlassGrant
      tags: [admin]
      summary: |
        Second-person approval of a pending critical-severity grant. Approver
        must hold a fresh step-up cookie and be a different user than the
        requester. Self-approval is refused (HTTP 403) and ledgered.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BreakGlassApprovalInput" }
      responses:
        "200":
          description: Grant approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BreakGlassGrant" }
        "400":
          description: Invalid input, rejected approval_note, or grant does not require approval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Self-approval refused
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Grant not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Grant already approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Grant revoked or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/break-glass/grants/{id}/revoke:
    post:
      operationId: revokeBreakGlassGrant
      tags: [admin]
      summary: |
        Revoke a break-glass grant before its TTL elapses. Requires a fresh
        step-up cookie. The requester or any other analyst in the same tenant
        may revoke. Already-revoked grants return 409; expired grants return
        410.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BreakGlassRevokeInput" }
      responses:
        "200":
          description: Grant revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BreakGlassGrant" }
        "400":
          description: Invalid input or rejected reason text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated or step-up missing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Grant not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Grant already revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Grant expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/break-glass/pending-approvals:
    get:
      operationId: listPendingBreakGlassApprovals
      tags: [admin]
      summary: |
        List grants pending second-person approval that the caller is
        eligible to approve (excludes grants the caller requested).
      responses:
        "200":
          description: Pending grants
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BreakGlassGrant" }

  /admin/findings/{id}/raw:
    get:
      operationId: getFindingRaw
      tags: [admin]
      summary: |
        Read raw evidence for a finding under an active break-glass grant.
        Every access is ledgered. Critical-severity findings require a
        two-person-approved grant.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Raw evidence
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FindingRawEvidence" }
        "403":
          description: No active grant, or pending second-person approval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/findings/{id}/resolve:
    post:
      operationId: resolveFinding
      tags: [admin]
      summary: |
        Close out a finding by marking it resolved or false positive. Any
        active break-glass grants for the finding are auto-revoked so raw-PHI
        access ends with the incident. Idempotent: re-resolving a finding
        already in the target state is a no-op. Requires session only.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveFindingInput" }
      responses:
        "200":
          description: Resolve result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolveFindingResult" }
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/findings/{id}/reopen:
    post:
      operationId: reopenFinding
      tags: [admin]
      summary: |
        Reopen a finding that was closed in error, transitioning it from a
        resolved / false_positive state back to "open". Unlike resolve, this
        does NOT auto-revoke break-glass grants. Idempotent: reopening a
        finding already open is a no-op. Accepts an optional free-text reason
        (scanned by the content policy) recorded in the audit ledger. Requires
        session only.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReopenFindingInput" }
      responses:
        "200":
          description: Reopen result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReopenFindingResult" }
        "400":
          description: Invalid input or reason rejected by content policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/findings/{id}/re-review:
    post:
      operationId: reReviewFinding
      tags: [admin]
      summary: |
        Operator-initiated re-review (replay) of a finding's Triage -> Verifier
        LLM analysis. Resets the finding's agent review status back to "pending"
        and re-enqueues the review; the supervisor's compare-and-swap bumps the
        review attempt so the agents re-run from scratch (fresh per-attempt
        idempotency keys) rather than recovering the prior verdict. Refuses with
        409 when a review is already in progress so a replay cannot clobber a
        run mid-flight. Accepts an optional free-text reason (scanned by the
        content policy) recorded in the audit ledger. Requires session only.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReReviewFindingInput" }
      responses:
        "200":
          description: Re-review enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReReviewFindingResult" }
        "400":
          description: Invalid input or reason rejected by content policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: A review is already in progress for this finding
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/ingest/replay:
    post:
      operationId: replayIngestFixture
      tags: [admin]
      summary: |
        Replay the static fixture log source through the in-memory bus and
        ingest pipeline. Dev/demo trigger; produces findings + ledger entries
        through the normal path. Rate-limited (5/min).
      responses:
        "200":
          description: Replay result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestReplayResult" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/remediation/proposals:
    get:
      operationId: listRemediationProposals
      tags: [admin]
      summary: |
        List remediation proposals for the caller's tenant (most recent first).
        These are agent-drafted, inert HITL proposals — they execute nothing
        until a human confirms. Session only; optional `?status` filter.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, rejected, executing, executed, execution_failed]
      responses:
        "200":
          description: Proposals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RemediationProposal" }
        "400":
          description: Invalid query
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/remediation/proposals/{id}/confirm:
    post:
      operationId: confirmRemediationProposal
      tags: [admin]
      summary: |
        Confirm a pending remediation proposal (HITL gate). Requires a fresh
        step-up cookie — confirming authorizes a potentially code-touching
        action, so it keeps the same elevated scope as break-glass. The actual
        execution stays operator/out-of-band by design. CAS on pending status.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemediationDecisionInput" }
      responses:
        "200":
          description: Proposal confirmed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemediationProposal" }
        "400":
          description: Invalid input or rejected note text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated or step-up missing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Proposal not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Proposal already decided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/remediation/proposals/{id}/reject:
    post:
      operationId: rejectRemediationProposal
      tags: [admin]
      summary: |
        Reject a pending remediation proposal. Session only — rejecting reduces
        exposure (the proposal stays inert). CAS on pending status.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemediationDecisionInput" }
      responses:
        "200":
          description: Proposal rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemediationProposal" }
        "400":
          description: Invalid input or rejected note text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Proposal not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Proposal already decided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /tools/get_finding:
    post:
      operationId: invokeGetFindingTool
      tags: [tools]
      summary: |
        MCP-shaped tool invocation surface for `get_finding`. Mirrors what the
        agent calls internally; useful for dashboard re-validation of
        citations and for manual exercises.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToolGetFindingInput" }
      responses:
        "200":
          description: Tool result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "404":
          description: Finding not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    LoginInput:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        tenant_id:
          type: string
          minLength: 1
          maxLength: 64
          default: default

    Session:
      type: object
      required: [sub, tenant_id]
      properties:
        sub: { type: string }
        tenant_id: { type: string }
        exp: { type: ["integer", "null"] }

    Finding:
      type: object
      required:
        - id
        - tenant_id
        - classification
        - severity
        - status
        - source
        - fingerprint
        - redacted_evidence
        - detector_version
        - first_seen_at
        - last_seen_at
        - occurrence_count
      properties:
        id: { type: string }
        tenant_id: { type: string }
        classification:
          type: string
          enum: [phi, secrets, pii, pii_s, internal, config, phi_in_output]
        subclass: { type: ["string", "null"] }
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, resolved, false_positive]
        source: { type: string }
        fingerprint: { type: string }
        redacted_evidence: { $ref: "#/components/schemas/RedactedEvidence" }
        detector_version: { type: string }
        first_seen_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        occurrence_count: { type: integer }
        agent_review_status:
          type: string
          enum: [pending, in_progress, completed, failed, skipped]
        triage_verdict:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/TriageVerdict"
        verifier_verdict:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/VerifierVerdict"
        last_agent_review_at:
          oneOf:
            - type: "null"
            - type: string
              format: date-time

    TriageVerdict:
      type: object
      required: [recommended_severity, recommended_action, rationale, confidence, prompt_injection_suspected]
      properties:
        recommended_severity:
          type: string
          enum: [low, medium, high, critical]
        recommended_action:
          type: string
          enum: [page_oncall, open_ticket, human_review, auto_resolve]
        rationale: { type: string }
        confidence: { type: number }
        prompt_injection_suspected: { type: boolean }

    VerifierVerdict:
      type: object
      required: [verdict, rationale, confidence, prompt_injection_suspected, agrees_with_triage]
      properties:
        verdict:
          type: string
          enum: [true_positive, likely_false_positive, needs_human_review]
        rationale: { type: string }
        confidence: { type: number }
        prompt_injection_suspected: { type: boolean }
        agrees_with_triage: { type: boolean }

    ReviewAttempt:
      type: object
      required: [attempt, outcome]
      properties:
        attempt: { type: integer }
        outcome:
          type: string
          enum: [completed, skipped, failed, incomplete]
        triage_verdict:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/TriageVerdict"
        triage_at:
          oneOf:
            - type: "null"
            - type: string
              format: date-time
        verifier_verdict:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/VerifierVerdict"
        verifier_at:
          oneOf:
            - type: "null"
            - type: string
              format: date-time
        note: { type: ["string", "null"] }
        last_event_seq: { type: integer }

    ReviewHistory:
      type: object
      required: [current_attempt, attempts]
      properties:
        current_attempt: { type: integer }
        attempts:
          type: array
          items: { $ref: "#/components/schemas/ReviewAttempt" }

    RedactedEvidence:
      type: object
      required: [snippet, redactions, truncated]
      properties:
        snippet: { type: string }
        redactions:
          type: array
          items: { type: string }
        truncated: { type: boolean }
        trust:
          type: string
          enum: [trusted, untrusted]
          default: untrusted

    ChatSession:
      type: object
      required: [id, tenant_id, user_id, created_at]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        user_id: { type: string }
        title: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }

    ChatSessionInput:
      type: object
      properties:
        title:
          type: string
          maxLength: 200

    ChatMessage:
      type: object
      required: [id, session_id, tenant_id, role, content, citations, created_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        tenant_id: { type: string }
        role:
          type: string
          enum: [user, assistant]
        content: { type: string }
        citations:
          type: array
          items: { type: string }
        agent_identity:
          oneOf:
            - $ref: "#/components/schemas/AgentIdentity"
            - type: "null"
        created_at: { type: string, format: date-time }

    AgentIdentity:
      type: object
      required: [agent, agent_version, model_id, prompt_hash]
      properties:
        agent: { type: string }
        agent_version: { type: string }
        model_id: { type: string }
        prompt_hash: { type: string }
        tool_versions:
          type: array
          items: { type: string }

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

    LedgerEntry:
      type: object
      required: [seq, ts, actor, event_type, payload, prev_hash, hash]
      properties:
        seq: { type: integer }
        ts: { type: string, format: date-time }
        tenant_id: { type: ["string", "null"] }
        actor:
          type: object
          additionalProperties: true
        event_type: { type: string }
        subject_type: { type: ["string", "null"] }
        subject_id: { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: true
        prev_hash: { type: string }
        hash: { type: string }

    LedgerPage:
      type: object
      required: [entries, head_seq, head_hash]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/LedgerEntry" }
        head_seq: { type: integer }
        head_hash: { type: string }

    LedgerVerifyResult:
      type: object
      required: [ok, walked, head_seq, head_hash, errors]
      properties:
        ok: { type: boolean }
        walked: { type: integer }
        head_seq: { type: integer }
        head_hash: { type: string }
        errors:
          type: array
          items: { type: string }

    LedgerCheckpoint:
      type: object
      required: [id, seq, head_hash, notarized_at, signature, signing_key_id]
      properties:
        id: { type: integer }
        seq: { type: integer }
        head_hash: { type: string }
        notarized_at: { type: string, format: date-time }
        signature: { type: string }
        signing_key_id: { type: string }

    LedgerCheckpointsPage:
      type: object
      required: [checkpoints]
      properties:
        checkpoints:
          type: array
          items: { $ref: "#/components/schemas/LedgerCheckpoint" }
        verify:
          oneOf:
            - $ref: "#/components/schemas/LedgerCheckpointsVerifyResult"
            - type: "null"

    LedgerCheckpointsVerifyResult:
      type: object
      required: [ok, checked, errors]
      properties:
        ok: { type: boolean }
        checked: { type: integer }
        errors:
          type: array
          items: { type: string }

    MaintenanceMetrics:
      type: object
      required: [memory, tiering]
      properties:
        memory:
          type: object
          required: [runs, embeddings_evicted, failures, last_run_at]
          properties:
            runs: { type: integer }
            embeddings_evicted: { type: integer }
            failures: { type: integer }
            last_run_at:
              oneOf:
                - { type: string, format: date-time }
                - { type: "null" }
        tiering:
          type: object
          required: [findings_tiered, failures, last_run_at]
          properties:
            findings_tiered: { type: integer }
            failures: { type: integer }
            last_run_at:
              oneOf:
                - { type: string, format: date-time }
                - { type: "null" }

    StepUpInput:
      type: object
      required: [token, reason]
      properties:
        token: { type: string, minLength: 1, maxLength: 8192 }
        reason: { type: string, minLength: 3, maxLength: 200 }

    StepUpResult:
      type: object
      required: [ok, expires_at, ttl_seconds]
      properties:
        ok: { type: boolean }
        expires_at: { type: string, format: date-time }
        ttl_seconds: { type: integer }

    StepUpStatus:
      type: object
      required: [provider, enrolled, verified]
      properties:
        provider: { type: string, enum: [dev, totp, webauthn, oidc] }
        enrolled: { type: boolean }
        verified: { type: boolean }

    StepUpEnrollResult:
      type: object
      required: [otpauth_uri, secret]
      properties:
        otpauth_uri: { type: string }
        secret: { type: string }

    StepUpEnrollVerifyInput:
      type: object
      required: [code]
      properties:
        code: { type: string, pattern: "^[0-9]{6}$" }

    StepUpEnrollVerifyResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }

    WebauthnRegistrationOptions:
      type: object
      required: [challenge, rpId, rpName, userIdB64url, userName]
      properties:
        challenge: { type: string }
        rpId: { type: string }
        rpName: { type: string }
        userIdB64url: { type: string }
        userName: { type: string }

    WebauthnRegisterFinishInput:
      type: object
      required: [attestationObject, clientDataJSON]
      properties:
        attestationObject: { type: string, minLength: 1, maxLength: 16384 }
        clientDataJSON: { type: string, minLength: 1, maxLength: 8192 }

    WebauthnRegisterFinishResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }

    WebauthnStepUpOptions:
      type: object
      required: [challenge, rpId, allowCredentials]
      properties:
        challenge: { type: string }
        rpId: { type: string }
        allowCredentials:
          type: array
          items: { type: string }

    OidcAuthUrl:
      type: object
      required: [authorization_url]
      properties:
        authorization_url: { type: string }

    OidcRegisterFinishInput:
      type: object
      required: [code, state]
      properties:
        code: { type: string, minLength: 1, maxLength: 8192 }
        state: { type: string, minLength: 1, maxLength: 2048 }

    OidcRegisterFinishResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }

    RecoveryStatus:
      type: object
      required: [enabled, remaining]
      properties:
        enabled: { type: boolean }
        remaining: { type: integer }

    RecoveryCodesResult:
      type: object
      required: [codes]
      properties:
        codes:
          type: array
          items: { type: string }

    RecoveryStepUpInput:
      type: object
      required: [token, reason]
      properties:
        token: { type: string, minLength: 1, maxLength: 64 }
        reason: { type: string, minLength: 3, maxLength: 200 }

    FactorRemoveResult:
      type: object
      required: [removed]
      properties:
        removed: { type: boolean }

    BreakGlassGrantInput:
      type: object
      required: [finding_id, justification]
      properties:
        finding_id:
          type: string
          minLength: 1
          maxLength: 64
        justification:
          type: string
          minLength: 10
          maxLength: 2000
        ttl_seconds:
          type: integer
          minimum: 60
          maximum: 900

    BreakGlassApprovalInput:
      type: object
      required: [approval_note]
      properties:
        approval_note:
          type: string
          minLength: 10
          maxLength: 2000

    BreakGlassRevokeInput:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000

    BreakGlassGrant:
      type: object
      required:
        - id
        - tenant_id
        - user_id
        - finding_id
        - justification
        - granted_at
        - expires_at
        - revoked_at
        - requires_second_approval
        - approver_user_id
        - approved_at
        - pending_approval
        - active
      properties:
        id: { type: string }
        tenant_id: { type: string }
        user_id: { type: string }
        finding_id: { type: string }
        justification: { type: string }
        granted_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: ["string", "null"], format: date-time }
        requires_second_approval: { type: boolean }
        approver_user_id: { type: ["string", "null"] }
        approved_at: { type: ["string", "null"], format: date-time }
        pending_approval: { type: boolean }
        active: { type: boolean }

    FindingRawEvidence:
      type: object
      required:
        - finding_id
        - grant_id
        - grant_expires_at
        - classification
        - severity
        - raw_evidence
        - two_person_approved
        - approver_user_id
      properties:
        finding_id: { type: string }
        grant_id: { type: string }
        grant_expires_at: { type: string, format: date-time }
        classification: { type: string }
        severity: { type: string }
        raw_evidence:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
        two_person_approved: { type: boolean }
        approver_user_id: { type: ["string", "null"] }

    ResolveFindingInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [resolved, false_positive]

    ResolveFindingResult:
      type: object
      required: [finding_id, status, transitioned, revoked_grants]
      properties:
        finding_id: { type: string }
        status:
          type: string
          enum: [resolved, false_positive]
        transitioned: { type: boolean }
        revoked_grants: { type: integer }

    ReopenFindingInput:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Optional free-text reason explaining why the closed finding is being
            reopened. Scanned by the same content policy as resolve/revoke
            justifications before it lands in the immutable audit ledger.

    ReopenFindingResult:
      type: object
      required: [finding_id, status, transitioned]
      properties:
        finding_id: { type: string }
        status:
          type: string
          enum: [open]
        transitioned: { type: boolean }

    ReReviewFindingInput:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Optional free-text reason ("why") for the operator-initiated replay.
            Scanned by the same content policy as resolve/reopen reasons before
            it lands in the immutable audit ledger.

    ReReviewFindingResult:
      type: object
      required: [finding_id, agent_review_status, enqueued]
      properties:
        finding_id: { type: string }
        agent_review_status:
          type: string
          enum: [pending]
        enqueued: { type: boolean }

    IngestReplayResult:
      type: object
      required: [replayed, delivered, errors]
      properties:
        replayed: { type: integer }
        delivered: { type: integer }
        errors: { type: integer }

    ToolGetFindingInput:
      type: object
      required: [finding_id]
      properties:
        finding_id:
          type: string
          minLength: 1
          maxLength: 64

    RemediationDecisionInput:
      type: object
      properties:
        note:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Optional free-text note ("why") recorded with the confirm/reject
            decision. Scanned by the same content policy as break-glass
            justifications before it lands in the immutable audit ledger.

    RemediationProposal:
      type: object
      required:
        - id
        - tenant_id
        - finding_id
        - action_type
        - summary
        - rationale
        - proposed_by_agent
        - proposed_by_user_id
        - status
        - created_at
        - decided_by_user_id
        - decided_at
        - decision_note
        - executed_at
        - external_ref
        - execution_error
        - executor_kind
      properties:
        id: { type: string }
        tenant_id: { type: string }
        finding_id: { type: string }
        action_type: { type: string }
        summary: { type: string }
        rationale: { type: string }
        proposed_by_agent: { type: string }
        proposed_by_user_id: { type: string }
        status:
          type: string
          enum: [pending, confirmed, rejected, executing, executed, execution_failed]
        created_at: { type: string, format: date-time }
        decided_by_user_id: { type: ["string", "null"] }
        decided_at: { type: ["string", "null"], format: date-time }
        decision_note: { type: ["string", "null"] }
        executed_at: { type: ["string", "null"], format: date-time }
        external_ref: { type: ["string", "null"] }
        execution_error: { type: ["string", "null"] }
        executor_kind: { type: ["string", "null"] }
